name: church_plant_toolkit
description: A toolkit for church plants to manage ministry tools.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  http: ^1.2.1
  file_picker: ^10.0.0
  archive: ^3.6.1
  sqflite_common_ffi: ^2.3.3
  sqflite: ^2.3.3
  path: ^1.9.0
  webview_flutter: ^4.10.0
  webview_windows: ^0.4.0

  # ── NEW: Recording & Streaming ──────────────────────────────────────────────
  #
  # ffmpeg_kit_flutter_full_gpl bundles a full FFmpeg build with all codecs
  # (H.264, AAC, etc.) needed for MP4 recording and RTMP streaming.
  # It wraps FFmpeg as a native plugin so no system ffmpeg is required.
  #
  # IMPORTANT: Add the following to your platform configs:
  #
  #   Android → android/app/build.gradle:
  #     minSdkVersion 24
  #     abiFilters "arm64-v8a", "x86_64"
  #
  #   iOS → ios/Podfile:
  #     platform :ios, '12.4'
  #
  #   macOS → macos/Podfile:
  #     platform :osx, '10.15'
  #
  # The full-gpl variant supports librtmp (needed for RTMP streaming).

  # screen_recorder captures the Flutter widget tree as video frames.
  # Used as the video source piped into ffmpeg for recording/streaming.
  # Repository: https://pub.dev/packages/screen_recorder
  screen_recorder: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/dictionary/